<!doctype html>
<html lang="hi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>𝐀𝐒𝐈𝐀𝐗 𝐏𝐑𝐎 - Wealth Creation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    :root { --bg: #0a0e1a; --card: rgba(20, 30, 50, 0.8); --glass: rgba(255,255,255,0.05); --accent: #00d4ff; --success: #00ff88; --warning: #ffaa00; --error: #ff4757; --muted: #a0b0c0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; font-family:'Inter',system-ui,sans-serif; }
    body { background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0a0e1a 100%); color: #e8f0ff; padding-bottom: 20px; overflow-x: hidden; }
    .app { max-width: 420px; margin: 0 auto; padding: 16px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; margin-bottom: 16px; backdrop-filter: blur(20px); background: rgba(10,14,26,0.8); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    .custom-logo { width: 120px; height: 48px; object-fit: contain; background: transparent; border-radius: 0; box-shadow: none; }
    .status { padding: 12px; border-radius: 12px; text-align: center; font-size: 0.85rem; font-weight: 500; background: var(--glass); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 16px; }
    .status.success { background: rgba(0,255,136,0.1); color: var(--success); border-color: var(--success); }
    .status.error { background: rgba(255,71,87,0.1); color: var(--error); border-color: var(--error); }
    .card-app { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 16px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { flex: 1; padding: 16px; border-radius: 16px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; gap: 8px; min-width: 120px; border: 1px solid rgba(255,255,255,0.05); }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .btn-modern { border-radius: 16px; padding: 14px 20px; font-weight: 600; border: none; transition: all 0.3s; min-height: 48px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #00ff88); color: #000; }
    .btn-success { background: linear-gradient(135deg, var(--success), #00cc66); color: #000; }
    .btn-warning { background: linear-gradient(135deg, var(--warning), #ff8800); color: #000; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .form-control { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; height: 48px; padding: 12px 16px; }
    .timer-card { background: linear-gradient(135deg, rgba(192,192,192,0.1), rgba(169,169,0.1)); border: 1px solid #C0C0C0; animation: pulse-timer 2s infinite; }
    .timer-display { font-size: 1.5rem; font-weight: 700; color: #C0C0C0; }
    .bottom-nav { position: relative; left: 50%; transform: translateX(-50%); bottom: 16px; width: calc(100% - 32px); display: flex; gap: 12px; background: var(--glass); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); }
    .nav-btn { flex: 1; padding: 14px; border-radius: 16px; background: transparent; border: none; color: var(--muted); }
    .nav-btn.active { background: var(--accent); color: #000; }
  </style>
</head>

</html>
